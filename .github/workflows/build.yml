name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build exe
      run: pyinstaller --onefile --windowed --name MultiChecker main.py
    
    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/MultiChecker.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

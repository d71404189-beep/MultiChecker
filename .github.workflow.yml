name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install -r requirements.txt pyinstaller
    - run: dir dist
    - run: pyinstaller --onefile --windowed --name MultiChecker main.py
    - run: dir dist
    - uses: actions/upload-artifact@v4
      with:
        name: MultiChecker
        path: dist/MultiChecker.exe
